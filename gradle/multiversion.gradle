// 多版本构建配置
// 此脚本为每个目标版本创建独立的构建任务

// 定义支持的版本列表（导出到项目作用域）
project.ext.supportedVersions = [
    '1.20.1': [
        'minecraft_version': '1.20.1',
        'forge_version': '47.4.16',
        'mapping_version': '1.20.1',
        'minecraft_version_range': '[1.20.1,1.21)',
        'forge_version_range': '[47,)',
        'loader_version_range': '[47,)'
    ],
    '1.21.4': [
        'minecraft_version': '1.21.4',
        'forge_version': '55.0.0',
        'mapping_version': '1.21.4',
        'minecraft_version_range': '[1.21.4,1.22)',
        'forge_version_range': '[55,)',
        'loader_version_range': '[55,)'
    ],
    '1.21.5': [
        'minecraft_version': '1.21.5',
        'forge_version': '55.0.3',
        'mapping_version': '1.21.5',
        'minecraft_version_range': '[1.21.5,1.22)',
        'forge_version_range': '[55,)',
        'loader_version_range': '[55,)'
    ]
]

// 为了方便，也创建一个局部变量引用
def supportedVersions = project.ext.supportedVersions

// 为每个版本创建构建任务
supportedVersions.each { versionKey, versionConfig ->
    def taskName = "buildFor${versionKey.replace('.', '_')}"
    
    // 创建版本特定的构建任务
    tasks.register(taskName) {
        group = 'multiversion'
        description = "构建 ${versionKey} 版本的模组"
        
        doFirst {
            println "开始构建 ${versionKey} 版本..."
            println "Minecraft: ${versionConfig.minecraft_version}"
            println "Forge: ${versionConfig.forge_version}"
        }
        
        dependsOn tasks.named('jar')
        
        doLast {
            println "${versionKey} 版本构建完成"
        }
    }
    
    // 创建版本特定的运行任务
    def runTaskName = "runClientFor${versionKey.replace('.', '_')}"
    tasks.register(runTaskName) {
        group = 'multiversion'
        description = "运行 ${versionKey} 版本的客户端"
        
        doFirst {
            println "准备运行 ${versionKey} 版本客户端..."
        }
        
        // 这里需要设置系统属性来指定目标版本
        systemProperty 'minecraft.version', versionKey
    }
}

// 创建聚合任务
tasks.register('buildAllVersions') {
    group = 'multiversion'
    description = '构建所有支持的版本'
    
    supportedVersions.each { versionKey, _ ->
        dependsOn "buildFor${versionKey.replace('.', '_')}"
    }
    
    doLast {
        println "所有版本构建完成"
    }
}

// 创建清理任务
tasks.register('cleanAllVersions') {
    group = 'multiversion'
    description = '清理所有版本的构建输出'
    
    doFirst {
        println "清理所有版本的构建输出..."
    }
    
    dependsOn tasks.named('clean')
    
    doLast {
        // 清理版本特定的输出目录
        supportedVersions.each { versionKey, _ ->
            def outputDir = file("build/libs/${versionKey}")
            if (outputDir.exists()) {
                delete outputDir
                println "已清理 ${versionKey} 版本输出目录"
            }
        }
    }
}

// 版本信息任务
tasks.register('listSupportedVersions') {
    group = 'multiversion'
    description = '列出所有支持的版本'
    
    doLast {
        println "支持的Minecraft版本:"
        supportedVersions.each { versionKey, versionConfig ->
            println "  ${versionKey} - Forge ${versionConfig.forge_version}"
        }
    }
}

// 版本兼容性检查任务
tasks.register('checkVersionCompatibility') {
    group = 'multiversion'
    description = '检查版本兼容性'
    
    doLast {
        println "版本兼容性检查:"
        
        // 检查Java版本兼容性
        def javaVersion = JavaVersion.current()
        println "当前Java版本: ${javaVersion}"
        
        // 检查Gradle版本兼容性
        def gradleVersion = gradle.gradleVersion
        println "当前Gradle版本: ${gradleVersion}"
        
        // 检查ForgeGradle插件兼容性
        println "ForgeGradle插件版本: [6.0.16,6.2)"
        
        // 检查每个版本的依赖兼容性
        supportedVersions.each { versionKey, versionConfig ->
            println "\n检查 ${versionKey} 版本:"
            println "  Minecraft: ${versionConfig.minecraft_version}"
            println "  Forge: ${versionConfig.forge_version}"
            println "  映射: ${versionConfig.mapping_version}"
            
            // 这里可以添加更详细的兼容性检查逻辑
            if (versionKey.startsWith('1.21')) {
                println "  注意: 1.21.x版本需要Java 21或更高版本"
            }
        }
    }
}

// 配置版本特定的构建输出
afterEvaluate {
    tasks.named('jar').configure {
        // 为每个版本创建不同的输出文件
        archiveBaseName = project.mod_id
        archiveVersion = project.mod_version
        
        // 根据系统属性决定是否添加版本后缀
        def targetVersion = System.getProperty('minecraft.version')
        if (targetVersion != null && !targetVersion.isEmpty()) {
            archiveVersion = "${project.mod_version}-${targetVersion}"
            println "构建目标版本: ${targetVersion}"
        }
    }
    
    // 配置版本特定的资源处理
    tasks.named('processResources').configure {
        // 根据目标版本动态替换资源中的版本信息
        def targetVersion = System.getProperty('minecraft.version')
        if (targetVersion != null && !targetVersion.isEmpty()) {
            def versionConfig = supportedVersions[targetVersion]
            if (versionConfig != null) {
                inputs.properties['minecraft_version'] = versionConfig.minecraft_version
                inputs.properties['forge_version'] = versionConfig.forge_version
                inputs.properties['minecraft_version_range'] = versionConfig.minecraft_version_range
                inputs.properties['forge_version_range'] = versionConfig.forge_version_range
                inputs.properties['loader_version_range'] = versionConfig.loader_version_range
            }
        }
    }
}

// 导出版本配置
ext {
    getVersionConfig = { String versionKey ->
        return supportedVersions[versionKey]
    }
    
    getSupportedVersions = {
        return supportedVersions.keySet() as List
    }
    
    getDefaultVersion = {
        return '1.20.1'
    }
}